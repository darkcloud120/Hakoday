
<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ハコリリ活動行事曆</title>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --fc-event-bg-color: #ff69b4; --fc-event-border-color: #ff69b4; }
        .fc-event { cursor: pointer; transition: opacity 0.2s; }
        .fc-event:hover { opacity: 0.8; }
    </style>
</head>
<body class="bg-pink-50 text-gray-800">

    <div class="container mx-auto p-4">
        <header class="text-center my-8">
            <h1 class="text-4xl font-bold text-pink-600">ハコリリ活動行事曆</h1>
            <p class="mt-2 text-gray-500">自動追蹤 Hakoniva Lily 官方「開催決定」資訊</p>
        </header>

        <div class="bg-white p-6 rounded-xl shadow-lg">
            <div id="calendar"></div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var calendarEl = document.getElementById('calendar');
            var calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'zh-tw',
                events: {
    url: 'events.json?t=' + new Date().getTime(), // 加後綴防止快取
    cache: false
},
                eventClick: function(info) {
                    info.jsEvent.preventDefault();
                    if (info.event.url) {
                        window.open(info.event.url, "_blank");
                    }
                },
                headerToolbar: {
                    left: 'prev,next today',
                    center: 'title',
                    right: 'dayGridMonth,listMonth'
                }
            });
            calendar.render();
        });
    </script>
</body>
</html>


<div class="container mx-auto p-4">
    <div class="bg-blue-50 p-4 mb-4 rounded-lg border border-blue-200">
        <h2 class="font-bold mb-2">➕ 手動新增活動工具</h2>
        <div class="grid grid-cols-1 md:grid-cols-4 gap-2">
            <input type="text" id="m-title" placeholder="活動名稱" class="p-2 border rounded">
            <input type="date" id="m-date" class="p-2 border rounded">
            <input type="text" id="m-url" placeholder="連結(選填)" class="p-2 border rounded">
            <button onclick="generateJSON()" class="bg-blue-500 text-white p-2 rounded hover:bg-blue-600">產生代碼</button>
        </div>
        <textarea id="result-json" class="w-full mt-2 p-2 text-xs font-mono hidden" readonly></textarea>
        <p id="tip" class="text-xs text-gray-500 mt-1 hidden">請複製上方內容，貼上到 GitHub 的 manual_events.json 檔案中。</p>
    </div>
    <div id="calendar"></div>
</div>

<script>
function generateJSON() {
    const title = document.getElementById('m-title').value;
    const date = document.getElementById('m-date').value;
    const url = document.getElementById('m-url').value || "#";
    if(!title || !date) return alert("請輸入名稱與日期");
    
    const obj = [{ "title": "⭐ " + title, "start": date, "url": url, "source": "manual", "color": "#6495ED" }];
    const box = document.getElementById('result-json');
    box.value = JSON.stringify(obj, null, 2);
    box.classList.remove('hidden');
    document.getElementById('tip').classList.remove('hidden');
}
</script>
