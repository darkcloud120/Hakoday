<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ハコリリ活動行事曆</title>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --fc-event-bg-color: #ff69b4; --fc-event-border-color: #ff69b4; }
        .fc-event-auto { background-color: #ff69b4 !important; border-color: #ff69b4 !important; }
        .fc-event-manual { background-color: #6495ED !important; border-color: #6495ED !important; }
        .fc-toolbar-title { color: #db2777; font-weight: bold; }
    </style>
</head>
<body class="bg-rose-50 min-h-screen">

    <div class="max-w-4xl mx-auto p-4">
        <header class="text-center py-8">
            <h1 class="text-3xl font-black text-pink-600 tracking-widest">ハコリリ活動行事曆</h1>
            <p class="text-pink-400 text-sm mt-1">Hakoniva Lily Event Calendar</p>
        </header>

        <div class="bg-white rounded-2xl shadow-sm p-6 mb-6 border border-pink-100">
            <h3 class="text-lg font-bold text-gray-700 mb-4 flex items-center">
                <span class="mr-2">📝</span> 手動新增工具
            </h3>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                <input type="text" id="m_title" placeholder="活動名稱" class="border p-2 rounded-lg focus:ring-2 focus:ring-pink-300 outline-none">
                <input type="date" id="m_date" class="border p-2 rounded-lg outline-none">
                <button onclick="addManual()" class="bg-pink-500 text-white font-bold py-2 rounded-lg hover:bg-pink-600 transition">產生 JSON 代碼</button>
            </div>
            <div id="output_area" class="hidden mt-4">
                <p class="text-xs text-gray-500 mb-1">請複製下方代碼並貼上至 GitHub 的 manual_events.json 檔案中：</p>
                <textarea id="m_result" class="w-full h-20 bg-gray-900 text-green-400 p-2 text-xs font-mono rounded" readonly></textarea>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-xl p-4 md:p-8 border border-pink-100">
            <div id="calendar"></div>
        </div>

        <footer class="text-center py-8 text-gray-400 text-xs">
            &copy; 2026 ハコリリ非官方行事曆 | 自動更新中
        </footer>
    </div>

    <script>
        function addManual() {
            const title = document.getElementById('m_title').value;
            const date = document.getElementById('m_date').value;
            if(!title || !date) return alert("請填寫名稱與日期");
            
            const data = [{ "title": "⭐ " + title, "start": date, "allDay": true, "className": "fc-event-manual" }];
            const out = document.getElementById('m_result');
            out.value = JSON.stringify(data, null, 2);
            document.getElementById('output_area').classList.remove('hidden');
        }

        document.addEventListener('DOMContentLoaded', function() {
            var calendarEl = document.getElementById('calendar');
            var calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'zh-tw',
                height: 'auto',
                headerToolbar: { left: 'prev,next', center: 'title', right: 'today' },
                // 同時讀取兩個檔案，加上時間戳記防止快取
                eventSources: [
                    { url: 'events.json?v=' + Date.now() },
                    { url: 'manual_events.json?v=' + Date.now() }
                ],
                eventClick: function(info) {
                    if (info.event.url) {
                        window.open(info.event.url, '_blank');
                        info.jsEvent.preventDefault();
                    }
                }
            });
            calendar.render();
        });
    </script>
</body>
</html>
