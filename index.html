<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ハコリリ 活動行事曆</title>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html, body { margin: 0; padding: 0; height: 100%; background: #fffafb; }
        #calendar-container { height: calc(100vh - 80px); padding: 20px; box-sizing: border-box; }
        .fc-event-auto { background-color: #ff69b4 !important; border: none !important; font-size: 0.9em; padding: 2px; }
        .fc-event-manual { background-color: #6495ED !important; border: none !important; }
        .fc-toolbar-title { font-size: 1.5em !important; font-weight: bold; color: #db2777; }
        /* 抽屜樣式 */
        #tool-drawer { transition: transform 0.3s ease-in-out; transform: translateY(100%); }
        #tool-drawer.open { transform: translateY(0); }
    </style>
</head>
<body class="font-sans overflow-hidden">

    <header class="h-16 flex items-center justify-between px-6 bg-white shadow-sm border-b border-pink-100">
        <h1 class="text-xl font-black text-pink-600 tracking-tighter">ハコリリ 非官方行事曆</h1>
        <button onclick="toggleDrawer()" class="bg-pink-50 text-pink-600 px-4 py-1.5 rounded-full text-sm font-medium border border-pink-200 hover:bg-pink-100">
            ➕ 手動新增
        </button>
    </header>

    <div id="calendar-container">
        <div id="calendar" class="h-full bg-white rounded-xl shadow-lg border border-pink-50 p-4"></div>
    </div>

    <div id="tool-drawer" class="fixed bottom-0 left-0 right-0 bg-white border-t border-pink-200 shadow-2xl p-6 z-50">
        <div class="max-w-3xl mx-auto">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-bold text-gray-700">產生 manual_events.json 代碼</h3>
                <button onclick="toggleDrawer()" class="text-gray-400 hover:text-gray-600">✕ 關閉</button>
            </div>
            <div class="flex flex-wrap gap-3">
                <input type="text" id="m_t" placeholder="活動名稱" class="flex-1 border p-2 rounded-lg outline-none focus:border-pink-400">
                <input type="date" id="m_d" class="border p-2 rounded-lg outline-none">
                <button onclick="gen()" class="bg-pink-500 text-white px-6 py-2 rounded-lg font-bold">生成代碼</button>
            </div>
            <textarea id="m_o" class="hidden w-full mt-4 bg-gray-50 p-2 text-xs font-mono border rounded h-20" readonly></textarea>
        </div>
    </div>

    <script>
        function toggleDrawer() { document.getElementById('tool-drawer').classList.toggle('open'); }
        
        function gen() {
            const title = document.getElementById('m_t').value;
            const date = document.getElementById('m_d').value;
            if(!title || !date) return alert("請完整輸入");
            const data = [{ "title": "⭐ " + title, "start": date, "allDay": true, "className": "fc-event-manual" }];
            const out = document.getElementById('m_o');
            out.value = JSON.stringify(data, null, 2);
            out.classList.remove('hidden');
        }

        document.addEventListener('DOMContentLoaded', function() {
            var calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
                initialView: 'dayGridMonth',
                locale: 'zh-tw',
                height: '100%',
                headerToolbar: { left: 'prev,next today', center: 'title', right: '' },
                eventSources: [
                    { url: 'events.json?v=' + Date.now() },
                    { url: 'manual_events.json?v=' + Date.now() }
                ],
                eventClick: function(info) {
                    if (info.event.url) { window.open(info.event.url, '_blank'); info.jsEvent.preventDefault(); }
                }
            });
            calendar.render();
        });
    </script>
</body>
</html>
