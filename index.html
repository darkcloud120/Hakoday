<style>
        /* 1. 全域樣式與自定義顏色 */
        :root {
            /* 微調後的質感薄荷綠主題 */
            --theme-primary: #00ced1;   /* 亮藍綠色 */
            --theme-secondary: #ccfbf1; /* 淡薄荷綠 (背景高亮用) */
            --theme-bg: #e6f4f1;        /* 稍微深一點、綠一點的底色 */
            --theme-text: #155e75;      /* 深藍綠色文字 */
        }

        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: var(--theme-bg); /* 套用新底色 */
            overflow: hidden;
        }

        /* 2. FullCalendar 樣式客製化 */
        #calendar-container {
            height: calc(100vh - 64px);
            padding: 12px;
            box-sizing: border-box;
        }

        .fc {
            height: 100%;
            background: white;
            border-radius: 16px; /* 圓角加強 */
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05); /* 柔和陰影 */
            border: 1px solid #b2ebf2; 
            overflow: hidden;
        }

        /* 頂部工具列 */
        .fc-header-toolbar {
            padding: 12px !important;
            margin-bottom: 0 !important;
            background-color: #ffffff;
        }

        .fc-toolbar-title {
            font-size: 1.2em !important;
            font-weight: 800;
            color: var(--theme-text) !important;
        }

        /* 按鈕樣式 */
        .fc-button {
            background-color: #f0fdfa !important;
            border: 1px solid #99f6e4 !important;
            color: var(--theme-text) !important;
            font-size: 0.85em !important;
            font-weight: 600 !important;
            border-radius: 8px !important;
        }

        .fc-button:hover {
            background-color: var(--theme-secondary) !important;
        }

        .fc-button-active {
            background-color: var(--theme-primary) !important;
            border-color: var(--theme-primary) !important;
            color: white !important;
        }

        /* 活動項目樣式 */
        .fc-event {
            cursor: pointer !important;
            background-color: var(--theme-primary) !important;
            border: none !important;
            padding: 3px 6px;
            margin: 1px 0;
            border-radius: 6px;
            font-size: 0.8em;
            transition: transform 0.1s;
        }
        
        .fc-event:hover {
            transform: scale(1.02);
            filter: brightness(1.05);
        }

        .fc-event-manual {
            background-color: #0891b2 !important; /* 手動項目稍微深色 */
        }

        /* 今日高亮 */
        .fc-day-today {
            background-color: #f0fdfa !important; 
        }

        /* 列表視圖客製化 */
        .fc-list-day-cushion {
            background-color: var(--theme-bg) !important;
        }

        /* 3. Modal 樣式 */
        .modal-overlay {
            background-color: rgba(15, 23, 42, 0.6); /* 稍微深一點的遮罩 */
            display: none;
            backdrop-filter: blur(4px); /* 背景模糊增加質感 */
        }

        .modal-overlay.active {
            display: flex;
        }
    </style>
