<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ハコリリ活動行事曆</title>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --theme-primary: #00ced1;   /* Hanon 亮藍綠 */
            --theme-secondary: #ccfbf1; /* 淡薄荷綠 */
            --theme-bg: #e6f4f1;        /* 質感底色 */
            --theme-text: #155e75;      /* 深藍綠文字 */
            --twitter-blue: #1DA1F2;    /* 經典推特藍 */
        }

        html, body {
            margin: 0; padding: 0; height: 100%;
            background-color: var(--theme-bg);
            overflow: hidden;
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
        }

        #calendar-container {
            height: calc(100vh - 64px);
            padding: 12px;
            box-sizing: border-box;
        }

        .fc {
            height: 100%;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
            border: 1px solid #b2ebf2;
            overflow: hidden;
        }

        .fc-event-time { display: none !important; }

        .fc-toolbar-title {
            font-size: 1.1em !important;
            font-weight: 800;
            color: var(--theme-text) !important;
        }

        .fc-button {
            background-color: #f0fdfa !important;
            border: 1px solid #99f6e4 !important;
            color: var(--theme-text) !important;
            font-weight: 600 !important;
            border-radius: 8px !important;
            font-size: 0.8em !important;
        }

        .fc-button-active {
            background-color: var(--theme-primary) !important;
            border-color: var(--theme-primary) !important;
            color: white !important;
        }

        .fc-event {
            cursor: pointer !important;
            background-color: var(--theme-primary) !important;
            border: none !important;
            padding: 3px 6px;
            border-radius: 6px;
            font-size: 0.8em;
        }

        .modal-overlay {
            background-color: rgba(15, 23, 42, 0.6);
            display: none;
            backdrop-filter: blur(4px);
        }

        .modal-overlay.active { display: flex; }
    </style>
</head>
<body>

    <header class="h-16 flex items-center justify-between px-4 md:px-6 bg-white shadow-sm border-b border-cyan-100 relative z-10">
        <div class="flex items-center gap-3">
            <div class="flex gap-1">
                <span class="w-2.5 h-2.5 rounded-full bg-[#00CED1]"></span>
                <span class="w-2.5 h-2.5 rounded-full bg-[#98FB98]"></span>
            </div>
            <h1 class="text-base md:text-lg font-black text-cyan-700 tracking-tighter mr-2">ハコリリ活動行事曆</h1>
            
            <nav class="flex items-center gap-3 border-l pl-3 border-cyan-50">
                <a href="https://x.com/kotohatakoyaki" target="_blank" class="text-[11px] font-bold text-[#1DA1F2] hover:opacity-70 flex items-center gap-1 transition">
                    <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M23.444 4.834c-.812.358-1.683.6-2.597.71a4.532 4.532 0 001.988-2.503 9.042 9.042 0 01-2.87 1.096 4.524 4.524 0 00-7.705 4.122 12.83 12.83 0 01-9.317-4.722 4.521 4.521 0 001.4 6.034 4.504 4.504 0 01-2.048-.565v.057a4.522 4.522 0 003.625 4.43 4.528 4.528 0 01-2.04.077 4.526 4.526 0 004.225 3.14A9.073 9.073 0 010 18.39a12.793 12.793 0 006.926 2.03c8.311 0 12.855-6.885 12.855-12.854 0-.196-.004-.39-.013-.585a9.184 9.184 0 002.256-2.333z"/></svg>
                    <span>Twitter</span>
                </a>
                <a href="https://www.youtube.com/@%E3%81%93%E3%81%A8%E3%81%AF%E3%81%AE%E3%81%9F%E3%81%93%E7%84%BC%E3%81%8D" target="_blank" class="text-[11px] font-bold text-red-600 hover:opacity-70 flex items-center gap-1 transition">
                    <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.376-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
                    <span>YouTube</span>
                </a>
                <a href="https://hakoniwalily.jp/news/" target="_blank" class="text-cyan-600 hover:opacity-70 p-1">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10l4 4v10a2 2 0 01-2 2z"></path></svg>
                </a>
            </nav>
        </div>
        
        <div class="flex items-center gap-3">
            <button onclick="toggleDrawer()" class="text-[10px] text-gray-200 hover:text-cyan-300">+</button>
        </div>
    </header>

    <div id="calendar-container">
        <div id="calendar"></div>
    </div>

    <div id="modal" class="modal-overlay fixed inset-0 z-[100] items-center justify-center p-4">
        <div class="bg-white rounded-2xl max-w-sm w-full p-6 shadow-2xl border-2 border-cyan-100 text-center scale-95 transition-transform duration-200 modal-content">
            <h3 class="text-cyan-600 font-bold mb-4 text-xs uppercase tracking-widest">Activity Detail</h3>
            <p id="modal-title" class="text-gray-800 font-bold text-lg leading-relaxed mb-6"></p>
            <div class="flex gap-2">
                <button onclick="closeModal()" class="flex-1 bg-gray-100 py-3 rounded-xl text-gray-400 font-bold">關閉</button>
                <a id="modal-link" href="#" target="_blank" class="flex-1 bg-cyan-500 py-3 rounded-xl text-white font-bold">前往官網</a>
            </div>
        </div>
    </div>

    <div id="drawer" class="fixed bottom-0 left-0 right-0 bg-white border-t p-4 transform translate-y-full transition-transform duration-300 z-50">
        <div class="max-w-md mx-auto">
            <div class="flex gap-2 mb-2">
                <input type="text" id="mt" placeholder="活動標題" class="border p-2 flex-1 rounded-lg text-sm">
                <input type="date" id="md" class="border p-2 rounded-lg text-sm">
                <button onclick="genJSON()" class="bg-cyan-500 text-white px-4 rounded-lg font-bold">生成</button>
            </div>
            <textarea id="mo" class="w-full hidden text-[10px] font-mono border p-2 h-16 bg-gray-50" readonly></textarea>
        </div>
    </div>

    <script>
        function toggleDrawer() { document.getElementById('drawer').classList.toggle('translate-y-0'); }
        function closeModal() { document.getElementById('modal').classList.remove('active'); }
        
        function openModal(title, url) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-link').href = url || "#";
            document.getElementById('modal').classList.add('active');
        }

        function genJSON() {
            const t = document.getElementById('mt').value, d = document.getElementById('md').value;
            if(!t || !d) return;
            const res = [{ "title": "⭐ "+t, "start": d, "description": t, "className": "fc-event-manual" }];
            const out = document.getElementById('mo');
            out.value = JSON.stringify(res, null, 2);
            out.classList.remove('hidden');
        }

        document.addEventListener('DOMContentLoaded', function() {
            var calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
                initialView: 'dayGridMonth',
                locale: 'zh-tw',
                height: '100%',
                displayEventTime: false,
                headerToolbar: { 
                    left: 'prev,next', 
                    center: 'title', 
                    right: 'dayGridMonth,listYear' 
                },
                buttonText: { month: '日曆', list: '清單' },
                views: {
                    listYear: { buttonText: '清單', duration: { years: 1 } }
                },
                eventSources: [
                    { url: 'events.json?v=' + Date.now() },
                    { url: 'manual_events.json?v=' + Date.now() }
                ],
                eventClick: function(info) {
                    info.jsEvent.preventDefault();
                    openModal(info.event.extendedProps.description || info.event.title, info.event.url);
                }
            });
            calendar.render();
        });

        window.onclick = function(e) {
            if(e.target.classList.contains('modal-overlay')) closeModal();
        }
    </script>
</body>
</html>
